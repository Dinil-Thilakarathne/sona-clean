name: Bug report
description: Report a bug or unexpected cleanup/scan behavior
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Command used
      description: Exact CLI command you ran
      placeholder: sona-clean clean ~/projects --target dist --all
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS and Node.js version
      placeholder: macOS 15, Node 22
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Add logs, screenshots, or reproduction details
