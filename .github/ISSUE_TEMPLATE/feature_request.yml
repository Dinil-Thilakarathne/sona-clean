name: Feature request
description: Suggest a new capability or UX improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What would you like `sona-clean` to do?
    validations:
      required: true

  - type: textarea
    id: safety
    attributes:
      label: Safety considerations
      description: If the feature affects cleanup behavior, what guardrails should it have?

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workaround or alternative approach
